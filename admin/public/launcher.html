<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Manager Portal</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { margin-bottom: 10px; font-size: 2.5rem; }
        p { margin-bottom: 30px; opacity: 0.9; }
        .links { display: flex; gap: 20px; justify-content: center; }
        .btn {
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        .btn-client {
            background-color: #fff;
            color: #2c3e50;
        }
        .btn-admin {
            background-color: #27ae60;
            color: white;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event Manager</h1>
        <p>Select a portal to enter the application</p>
        <div class="links">
            <a href="http://localhost:3001" class="btn btn-client">Public Catalog</a>
            <a href="http://localhost:3000" class="btn btn-admin">Admin Dashboard</a>
        </div>
    </div>
</body>
</html>
